<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornecedor - Organizacoes Tabajara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/tabajara.css}" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <a class="brand" th:href="@{/home}"><span class="brand-mark"><i class="bi bi-building"></i></span><span><span class="brand-name">Organizacoes Tabajara</span><span class="brand-subtitle">Painel administrativo</span></span></a>
        <nav class="side-nav">
            <a class="side-link" th:href="@{/home}"><i class="bi bi-grid-1x2"></i>Inicio</a>
            <a class="side-link" th:href="@{/pedidos/criar}"><i class="bi bi-receipt-cutoff"></i>Pedidos</a>
            <a class="side-link" th:href="@{/produtos/listar}"><i class="bi bi-box-seam"></i>Produtos</a>
            <a class="side-link active" th:href="@{/fornecedores/listar}"><i class="bi bi-truck"></i>Fornecedores</a>
            <a class="side-link" th:href="@{/usuarios/listar}"><i class="bi bi-people"></i>Usuarios</a>
            <a class="side-link" th:href="@{/relatorios/pedidos}"><i class="bi bi-bar-chart-line"></i>Relatorios</a>
        </nav>
        <div class="side-actions">
            <a class="side-button" th:href="@{/fornecedores/listar}"><i class="bi bi-list-ul"></i>Listar fornecedores</a>
            <a class="side-button logout-link" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i>Sair</a>
        </div>
    </aside>
    <main class="content">
        <nav class="mobile-menu">
            <a class="side-link" th:href="@{/home}"><i class="bi bi-grid-1x2"></i>Inicio</a>
            <a class="side-link" th:href="@{/produtos/listar}"><i class="bi bi-box-seam"></i>Produtos</a>
            <a class="side-link" th:href="@{/fornecedores/listar}"><i class="bi bi-truck"></i>Fornecedores</a>
        </nav>
        <header class="page-top">
            <div>
                <div class="eyebrow">Parceiros</div>
                <h1 class="page-title" th:text="${fornecedor.idFornecedor != null} ? 'Editar fornecedor' : 'Novo fornecedor'">Novo fornecedor</h1>
                <p class="page-subtitle" th:text="${fornecedor.idFornecedor != null} ? 'Atualize os dados do fornecedor selecionado.' : 'Cadastre um fornecedor para vincular aos produtos.'">Cadastre um fornecedor.</p>
            </div>
            <div class="page-actions"><a class="action-button" th:href="@{/fornecedores/listar}"><i class="bi bi-arrow-left"></i>Voltar</a></div>
        </header>

        <section class="panel">
            <div class="panel-header">
                <h2 class="panel-title">Dados do fornecedor</h2>
                <p class="panel-subtitle">Nome, CNPJ, telefone, endereco e cidade.</p>
            </div>
            <div class="panel-body">
                <form th:action="@{/fornecedores/salvar}" method="POST" th:object="${fornecedor}">
                    <input type="hidden" th:field="*{idFornecedor}">
                    <div class="form-grid">
                        <div class="full">
                            <label class="form-label" for="nomeFornecedor">Nome</label>
                            <input class="form-control" id="nomeFornecedor" type="text" th:field="*{nomeFornecedor}" placeholder="Nome do fornecedor" required>
                        </div>
                        <div>
                            <label class="form-label" for="cnpjFornecedor">CNPJ</label>
                            <input class="form-control" id="cnpjFornecedor" type="text" th:field="*{cnpjFornecedor}" placeholder="00.000.000/0000-00" required>
                        </div>
                        <div>
                            <label class="form-label" for="telefoneFornecedor">Telefone</label>
                            <input class="form-control" id="telefoneFornecedor" type="text" th:field="*{telefoneFornecedor}" placeholder="(00) 00000-0000" required>
                        </div>
                        <div>
                            <label class="form-label" for="enderecoFornecedor">Endereco</label>
                            <input class="form-control" id="enderecoFornecedor" type="text" th:field="*{enderecoFornecedor}" placeholder="Rua, numero e bairro" required>
                        </div>
                        <div>
                            <label class="form-label" for="cidadeFornecedor">Cidade</label>
                            <input class="form-control" id="cidadeFornecedor" type="text" th:field="*{cidadeFornecedor}" placeholder="Cidade" required>
                        </div>
                    </div>
                    <div class="form-footer">
                        <a class="form-button" th:href="@{/fornecedores/listar}">Cancelar</a>
                        <button type="submit" class="form-button primary"><i class="bi bi-check-circle"></i><span th:text="${fornecedor.idFornecedor != null} ? 'Atualizar fornecedor' : 'Criar fornecedor'">Salvar</span></button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
<script>document.getElementById('nomeFornecedor')?.focus();</script>
</body>
</html>
