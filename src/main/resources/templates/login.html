<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Organizações Tabajara</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #f4f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            margin: 0;
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: #ffffff;
            border: 1px solid #e2e4e9;
            border-radius: 16px;
            padding: 2.5rem 2rem;
        }

        .login-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #eff6ff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
        }

        .login-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            color: #111827;
            margin: 0 0 0.25rem;
        }

        .login-sub {
            font-size: 13px;
            text-align: center;
            color: #6b7280;
            margin: 0 0 1.75rem;
        }

        .field-group { margin-bottom: 1rem; }

        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        .field-input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            font-size: 14px;
            color: #111827;
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .field-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .field-input::placeholder { color: #9ca3af; }

        .btn-primary {
            width: 100%;
            height: 44px;
            margin-top: 0.5rem;
            background: #1d4ed8;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-primary:hover { background: #1e40af; }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1.5rem 0 1rem;
        }

        .divider span { font-size: 12px; color: #9ca3af; white-space: nowrap; }
        .divider hr { flex: 1; border: none; border-top: 1px solid #e5e7eb; margin: 0; }

        .link-list { display: flex; flex-direction: column; gap: 10px; }

        .link-item {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 42px;
            padding: 0 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            text-decoration: none;
            transition: background 0.12s, border-color 0.12s;
        }

        .link-item:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            color: #111827;
        }

        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 1.5rem;
            font-size: 13px;
            color: #6b7280;
            text-decoration: none;
        }

        .btn-back:hover { color: #374151; }

        .alert { font-size: 13px; border-radius: 8px; padding: 10px 14px; margin-bottom: 1.25rem; }
    </style>
</head>
<body>

<div class="login-wrap">

    <div class="login-card">

        <div class="login-logo">
            <!-- ícone de usuário simples -->
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>

        <h1 class="login-title">Entrar na conta</h1>
        <p class="login-sub">Organizações Tabajara</p>

        <div th:if="${param.error}" class="alert alert-danger">
            Credenciais inválidas. Verifique e tente novamente.
        </div>
        <div th:if="${param.resetSucesso}" class="alert alert-success">
            Senha redefinida com sucesso!
        </div>

        <form th:action="@{/login}" method="post">

            <div class="field-group">
                <label class="field-label" for="username">Login</label>
                <input class="field-input" type="text" id="username" name="username" placeholder="Seu usuário" required>
            </div>

            <div class="field-group">
                <label class="field-label" for="password">Senha</label>
                <input class="field-input" type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Entrar no sistema</button>

            <div class="divider">
                <hr/><span>ou</span><hr/>
            </div>

            <div class="link-list">
                <a th:href="@{/usuarios/criar}" class="link-item">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                    Criar conta
                </a>
                <a th:href="@{/esqueci-senha}" class="link-item">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Esqueci minha senha
                </a>
            </div>

        </form>

        <a href="/" class="btn-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Voltar para o início
        </a>

    </div>
</div>

</body>
</html>
