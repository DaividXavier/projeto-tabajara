<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Organizacoes Tabajara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/tabajara.css}" rel="stylesheet">
</head>
<body>
<main class="auth-page">
    <section class="auth-hero">
        <a class="brand border-0 p-0" th:href="@{/}">
            <span class="brand-mark"><i class="bi bi-building"></i></span>
            <span><span class="brand-name">Organizacoes Tabajara</span><span class="brand-subtitle">Nova senha</span></span>
        </a>
        <div>
            <h1>Defina uma nova senha.</h1>
            <p>Escolha uma senha e confirme para recuperar o acesso ao sistema.</p>
        </div>
        <span class="brand-subtitle">&copy; 2026 Organizacoes Tabajara</span>
    </section>
    <section class="auth-card-wrap">
        <div class="auth-card">
            <span class="auth-logo"><i class="bi bi-shield-lock"></i></span>
            <h2>Redefinir senha</h2>
            <p>Preencha os campos abaixo para concluir.</p>

            <div th:if="${erro}" class="alert alert-danger"><span th:text="${erro}"></span></div>
            <div th:if="${mensagem}" class="alert alert-success"><span th:text="${mensagem}"></span></div>

            <form th:action="@{/redefinir-senha}" method="post">
                <input type="hidden" name="token" th:value="${token}">
                <div class="mb-3">
                    <label class="form-label" for="novaSenha">Nova senha</label>
                    <input class="form-control" type="password" id="novaSenha" name="novaSenha" placeholder="Digite sua nova senha" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="confirmarSenha">Confirmar senha</label>
                    <input class="form-control" type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Confirme sua nova senha" required>
                </div>
                <button type="submit" class="form-button primary w-100">Salvar nova senha</button>
            </form>
            <div class="d-grid gap-2 mt-3">
                <a th:href="@{/login}" class="action-button"><i class="bi bi-arrow-left"></i>Voltar ao login</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
