<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario - Organizacoes Tabajara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/tabajara.css}" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <a class="brand" th:href="@{/home}"><span class="brand-mark"><i class="bi bi-building"></i></span><span><span class="brand-name">Organizacoes Tabajara</span><span class="brand-subtitle">Painel administrativo</span></span></a>
        <nav class="side-nav">
            <a class="side-link" th:href="@{/home}"><i class="bi bi-grid-1x2"></i>Inicio</a>
            <a class="side-link" th:href="@{/pedidos/criar}"><i class="bi bi-receipt-cutoff"></i>Pedidos</a>
            <a class="side-link" th:href="@{/produtos/listar}"><i class="bi bi-box-seam"></i>Produtos</a>
            <a class="side-link" th:href="@{/fornecedores/listar}"><i class="bi bi-truck"></i>Fornecedores</a>
            <a class="side-link active" th:href="@{/usuarios/listar}"><i class="bi bi-people"></i>Usuarios</a>
            <a class="side-link" th:href="@{/relatorios/pedidos}"><i class="bi bi-bar-chart-line"></i>Relatorios</a>
        </nav>
        <div class="side-actions">
            <a class="side-button" th:href="@{/usuarios/listar}"><i class="bi bi-list-ul"></i>Listar usuarios</a>
            <a class="side-button logout-link" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i>Sair</a>
        </div>
    </aside>
    <main class="content">
        <nav class="mobile-menu">
            <a class="side-link" th:href="@{/home}"><i class="bi bi-grid-1x2"></i>Inicio</a>
            <a class="side-link" th:href="@{/usuarios/listar}"><i class="bi bi-people"></i>Usuarios</a>
            <a class="side-link" th:href="@{/login}"><i class="bi bi-box-arrow-in-right"></i>Login</a>
        </nav>
        <header class="page-top">
            <div>
                <div class="eyebrow">Acesso</div>
                <h1 class="page-title">Novo usuario</h1>
                <p class="page-subtitle">Cadastre um usuario para acessar o sistema.</p>
            </div>
            <div class="page-actions"><a class="action-button" th:href="@{/usuarios/listar}"><i class="bi bi-arrow-left"></i>Voltar</a></div>
        </header>

        <section class="panel">
            <div class="panel-header">
                <h2 class="panel-title">Dados do usuario</h2>
                <p class="panel-subtitle">Nome, email, login e senha de acesso.</p>
            </div>
            <div class="panel-body">
                <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
                    <div class="form-grid">
                        <div class="full">
                            <label class="form-label" for="nomeUsuario">Nome</label>
                            <input class="form-control" id="nomeUsuario" type="text" th:field="*{nomeUsuario}" placeholder="Nome completo" required>
                        </div>
                        <div>
                            <label class="form-label" for="emailUsuario">Email</label>
                            <input class="form-control" id="emailUsuario" type="email" th:field="*{emailUsuario}" placeholder="email@exemplo.com" required>
                        </div>
                        <div>
                            <label class="form-label" for="loginUsuario">Login</label>
                            <input class="form-control" id="loginUsuario" type="text" th:field="*{loginUsuario}" placeholder="usuario" required>
                        </div>
                        <div class="full">
                            <label class="form-label" for="senhaUsuario">Senha</label>
                            <input class="form-control" id="senhaUsuario" type="password" th:field="*{senhaUsuario}" placeholder="Digite uma senha" required>
                        </div>
                    </div>
                    <div class="form-footer">
                        <a class="form-button" th:href="@{/login}">Cancelar</a>
                        <button type="submit" class="form-button primary"><i class="bi bi-check-circle"></i>Criar usuario</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
<script>document.getElementById('nomeUsuario')?.focus();</script>
</body>
</html>
