<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Organizacoes Tabajara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/tabajara.css}" rel="stylesheet">
</head>
<body>
<main class="auth-page">
    
    <section class="auth-card-wrap">
        <div class="auth-card">
            <span class="auth-logo"><i class="bi bi-envelope-check"></i></span>
            <h2>Esqueci minha senha</h2>
            <p>Digite seu email para receber o link de recuperacao.</p>

            <div th:if="${erro}" class="alert alert-danger"><span th:text="${erro}"></span></div>
            <div th:if="${mensagem}" class="alert alert-success"><span th:text="${mensagem}"></span></div>

            <form th:action="@{/esqueci-senha}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" type="email" id="email" name="email" placeholder="seu.email@exemplo.com" required>
                </div>
                <button type="submit" class="form-button primary w-100">Enviar link</button>
            </form>
            <div class="d-grid gap-2 mt-3">
                <a th:href="@{/login}" class="action-button"><i class="bi bi-arrow-left"></i>Voltar ao login</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
