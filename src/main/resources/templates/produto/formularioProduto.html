<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto - Organizacoes Tabajara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/tabajara.css}" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <a class="brand" th:href="@{/home}"><span class="brand-mark"><i class="bi bi-building"></i></span><span><span class="brand-name">Organizacoes Tabajara</span><span class="brand-subtitle">Painel administrativo</span></span></a>
        <nav class="side-nav">
            <a class="side-link" th:href="@{/home}"><i class="bi bi-grid-1x2"></i>Inicio</a>
            <a class="side-link" th:href="@{/pedidos/criar}"><i class="bi bi-receipt-cutoff"></i>Pedidos</a>
            <a class="side-link active" th:href="@{/produtos/listar}"><i class="bi bi-box-seam"></i>Produtos</a>
            <a class="side-link" th:href="@{/fornecedores/listar}"><i class="bi bi-truck"></i>Fornecedores</a>
            <a class="side-link" th:href="@{/usuarios/listar}"><i class="bi bi-people"></i>Usuarios</a>
            <a class="side-link" th:href="@{/relatorios/pedidos}"><i class="bi bi-bar-chart-line"></i>Relatorios</a>
        </nav>
        <div class="side-actions">
            <a class="side-button" th:href="@{/produtos/listar}"><i class="bi bi-list-ul"></i>Listar produtos</a>
            <a class="side-button logout-link" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i>Sair</a>
        </div>
    </aside>
    <main class="content">
        <nav class="mobile-menu">
            <a class="side-link" th:href="@{/home}"><i class="bi bi-grid-1x2"></i>Inicio</a>
            <a class="side-link" th:href="@{/produtos/listar}"><i class="bi bi-box-seam"></i>Produtos</a>
            <a class="side-link" th:href="@{/fornecedores/listar}"><i class="bi bi-truck"></i>Fornecedores</a>
        </nav>
        <header class="page-top">
            <div>
                <div class="eyebrow">Cadastro</div>
                <h1 class="page-title" th:text="${produto.idProduto != null} ? 'Editar produto' : 'Novo produto'">Novo produto</h1>
                <p class="page-subtitle" th:text="${produto.idProduto != null} ? 'Atualize os dados do produto selecionado.' : 'Preencha as informacoes para cadastrar um novo produto.'">Preencha as informacoes.</p>
            </div>
            <div class="page-actions">
                <a class="action-button" th:href="@{/produtos/listar}"><i class="bi bi-arrow-left"></i>Voltar</a>
            </div>
        </header>

        <section class="panel">
            <div class="panel-header">
                <h2 class="panel-title">Dados do produto</h2>
                <p class="panel-subtitle">Descricao, preco, unidade, marca e fornecedor vinculado.</p>
            </div>
            <div class="panel-body">
                <form th:action="@{/produtos/salvar}" method="POST" th:object="${produto}">
                    <input type="hidden" th:field="*{idProduto}">
                    <div class="form-grid">
                        <div class="full">
                            <label class="form-label" for="descricaoProduto">Descricao</label>
                            <input class="form-control" id="descricaoProduto" type="text" th:field="*{descricaoProduto}" placeholder="Nome do produto" required>
                        </div>
                        <div>
                            <label class="form-label" for="valorProduto">Valor</label>
                            <input class="form-control" id="valorProduto" type="number" step="0.01" min="0" th:field="*{valorProduto}" placeholder="0,00" required>
                        </div>
                        <div>
                            <label class="form-label" for="unidadeProduto">Unidade</label>
                            <input class="form-control" id="unidadeProduto" type="text" th:field="*{unidadeProduto}" placeholder="UN, KG, CX" required>
                        </div>
                        <div>
                            <label class="form-label" for="marcaProduto">Marca</label>
                            <input class="form-control" id="marcaProduto" type="text" th:field="*{marcaProduto}" placeholder="Marca do produto" required>
                        </div>
                        <div>
                            <label class="form-label" for="fornecedor">Fornecedor</label>
                            <select class="form-select" id="fornecedor" th:field="*{fornecedor.idFornecedor}" required>
                                <option value="">Selecione um fornecedor</option>
                                <option th:each="fornecedor : ${fornecedores}" th:value="${fornecedor.idFornecedor}" th:text="${fornecedor.nomeFornecedor}">Fornecedor</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-footer">
                        <a class="form-button" th:href="@{/produtos/listar}">Cancelar</a>
                        <button type="submit" class="form-button primary"><i class="bi bi-check-circle"></i><span th:text="${produto.idProduto != null} ? 'Atualizar produto' : 'Criar produto'">Salvar</span></button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
<script>document.getElementById('descricaoProduto')?.focus();</script>
</body>
</html>
